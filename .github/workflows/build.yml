name: Build ClawVoice

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    outputs:
      build_status: ${{ steps.set_status.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('windows/requirements.txt', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd windows
          pip install pyinstaller PyQt6 keyboard pyaudio requests pynput pyperclip pystray Pillow pywin32 SpeechRecognition

      - name: Build exe
        run: |
          cd windows
          pyinstaller --onefile --windowed --name ClawVoice --icon=assets/icon.ico --add-data "assets;assets" --collect-all speech_recognition --version-file=version_info.txt run.py

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          cd windows
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Set status output
        id: set_status
        if: always()
        shell: bash
        run: |
          if [ -f "windows/ClawVoice-Setup.exe" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ClawVoice-Setup
          path: windows/ClawVoice-Setup.exe
          retention-days: 30

  update-release:
    name: Publish Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: needs.build-windows.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClawVoice-Setup

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.5.1
          name: ClawVoice v0.5.1
          make_latest: true
          body: |
            ## ClawVoice v0.5.1

            Voice dictation for Windows. Hold Ctrl+Alt, speak, release — text appears in any app.

            ### What's new
            - Completely rebuilt transcription engine — reliable, no crashes
            - No API key needed — works out of the box
            - Fixed hotkey release detection
            - Fixed text injection (no more crashes on paste)
            - Clean settings dashboard — just Profile and Logs

            ### Install
            1. Download ClawVoice-Setup.exe below
            2. If Windows blocks it: right-click → Properties → Unblock → Apply
            3. Run the installer
            4. Hold Ctrl+Alt to dictate, release to inject text

            ### Requirements
            - Windows 10 or 11
            - A microphone
            - Internet connection (for speech recognition)
          files: ClawVoice-Setup.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  log-to-hub:
    name: Log to Nest Hub
    needs: build-windows
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Log build result to Hub
        run: |
          STATUS="${{ needs.build-windows.result }}"
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          REF="${{ github.ref_name }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          if [ "$STATUS" = "success" ]; then ICON="✅"; LOG_STATUS="done"; else ICON="❌"; LOG_STATUS="error"; fi
          curl -s -X POST ${{ secrets.HUB_URL }}/api/log/task \
            -H "Content-Type: application/json" \
            -d "{\"agent\":\"github\",\"task_type\":\"ci_build\",\"task_summary\":\"$ICON [ClawVoice] Build $STATUS on $REF ($SHA_SHORT) — \\\"$COMMIT_MSG\\\"\",\"status\":\"$LOG_STATUS\"}" || echo "Hub log skipped"
