name: Build ClawVoice

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd windows
          pip install pyinstaller PyQt6 keyboard pyaudio requests pynput pyperclip anthropic pystray Pillow pywin32

      - name: Build exe
        run: |
          cd windows
          pyinstaller --onefile --windowed --name ClawVoice --icon=assets/icon.ico --add-data "assets;assets" run.py

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          cd windows
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ClawVoice-Setup
          path: windows/ClawVoice-Setup.exe

  update-release:
    name: Update v0.2 Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClawVoice-Setup

      - name: Upload to v0.2 release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.2
          files: ClawVoice-Setup.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
