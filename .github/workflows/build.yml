name: Build ClawVoice

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd windows
          pip install pyinstaller PyQt6 keyboard pyaudio requests pynput pyperclip anthropic pystray Pillow pywin32

      - name: Build .exe with PyInstaller
        run: |
          cd windows
          pyinstaller --onefile --windowed --name ClawVoice --icon=assets/icon.ico --add-data "assets;assets" run.py

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          cd windows
          "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawVoice-Setup
          path: windows/ClawVoice-Setup.exe

  publish-release:
    name: Publish Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ClawVoice-Setup

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ClawVoice-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
